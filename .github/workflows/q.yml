        name: Start Cloudflare Tunnel
        run: |
          # Запускаем туннель в фоне
          nohup cloudflared tunnel --url tcp://localhost:5900 > cf.log 2>&1 &
          
          echo "Waiting for Cloudflare URL..."
          
          # Цикл ожидания появления ссылки в логах (до 30 секунд)
          for i in {1..30}; do
            URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cf.log | head -n 1)
            if [ ! -z "$URL" ]; then
              # Превращаем https:// в tcp:// для ясности
              TCP_URL=$(echo $URL | sed 's/https:\/\///')
              echo "--- ТВОЯ ССЫЛКА ДЛЯ ПОДКЛЮЧЕНИЯ ---"
              echo "Адрес: $TCP_URL"
              echo "Порт: 5900 (если спросит)"
              echo "----------------------------------"
              break
            fi
            sleep 2
          done

          if [ -z "$URL" ]; then
            echo "Ошибка: Ссылка не найдена. Лог выполнения:"
            cat cf.log
            exit 1
          fi

      - name: Keep Alive
        run: |
          echo "Сессия активна. Нажмите 'Cancel run' в GitHub Actions, чтобы завершить."
          sleep 21600
